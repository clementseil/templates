<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>OG · C — Split avant/après</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { width:1200px; height:630px; }
    body {
      width:1200px; height:630px;
      position:relative; overflow:hidden;
      font-family:'Inter',sans-serif;
      background:#0F1929;
      color:#fff;
    }
    .split { position:absolute; inset:0; display:flex; }
    .half {
      flex:1; position:relative; overflow:hidden;
    }
    .half img {
      position:absolute; inset:0;
      width:100%; height:100%; object-fit:cover; display:block;
    }
    .half.before::after {
      content:""; position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(15,25,41,0.15) 0%, rgba(15,25,41,0.55) 100%);
    }
    .half.after::after {
      content:""; position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(15,25,41,0) 0%, rgba(15,25,41,0.45) 100%);
    }
    .tag {
      position:absolute;
      top:24px;
      padding:8px 18px;
      font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
      border-radius:6px;
      backdrop-filter:blur(8px);
      z-index:2;
    }
    .tag-before { left:24px; background:rgba(15,25,41,0.7); color:#fff; border:1px solid rgba(255,255,255,0.18); }
    .tag-after  { right:24px; background:#E8753A; color:#fff; box-shadow:0 4px 16px rgba(232,117,58,0.4); }

    /* Bande centrale fine + bandeau bas */
    .divider {
      position:absolute; top:0; bottom:0;
      left:50%; transform:translateX(-50%);
      width:4px; background:#fff;
      box-shadow: 0 0 24px rgba(255,255,255,0.4);
      z-index:3;
    }
    .divider::before, .divider::after {
      content:""; position:absolute; left:50%; transform:translateX(-50%);
      width:14px; height:14px; border-radius:50%;
      background:#fff; box-shadow:0 0 12px rgba(255,255,255,0.6);
    }
    .divider::before { top:0; transform:translate(-50%,-50%); }
    .divider::after  { bottom:0; transform:translate(-50%,50%); }

    .bottom-bar {
      position:absolute; left:0; right:0; bottom:0;
      padding:28px 56px;
      background: linear-gradient(0deg, rgba(15,25,41,0.96) 0%, rgba(15,25,41,0.72) 60%, transparent 100%);
      display:flex; justify-content:space-between; align-items:flex-end;
      z-index:4;
    }
    .left h1 {
      font-family:'DM Serif Display',serif;
      font-weight:400;
      font-size:54px; line-height:1;
      letter-spacing:-0.015em;
      color:#fff;
      margin-bottom:6px;
    }
    .left h1 .it { font-style:italic; color:#E8753A; }
    .left .meta {
      font-size:16px; color:rgba(255,255,255,0.7);
      letter-spacing:0.3px;
    }
    .right {
      text-align:right;
      display:flex; flex-direction:column; gap:6px; align-items:flex-end;
    }
    .right .stars { font-size:18px; color:#D4A24C; letter-spacing:2px; }
    .right .score { font-size:14px; color:rgba(255,255,255,0.85); font-weight:500; }
    .cta {
      margin-top:8px;
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 18px;
      background:#fff; color:#1E3A5F;
      border-radius:8px;
      font-size:14px; font-weight:700; letter-spacing:0.4px;
    }
  </style>
</head>
<body>
  <div class="split">
    <div class="half before">
      <span class="tag tag-before">Avant</span>
      <img src="../template-4-avis/assets/img/avant.jpg" alt="">
    </div>
    <div class="half after">
      <span class="tag tag-after">Après</span>
      <img src="../template-4-avis/assets/img/apres.jpg" alt="">
    </div>
  </div>
  <div class="divider"></div>

  <div class="bottom-bar">
    <div class="left">
      <h1>Et si on <span class="it">transformait</span> votre intérieur ?</h1>
      <div class="meta">Peintre artisan · Devis gratuit sous 48h</div>
    </div>
    <div class="right">
      <span class="stars">★★★★★</span>
      <span class="score">4,9/5 — Avis Google vérifiés</span>
      <span class="cta">Demander un devis →</span>
    </div>
  </div>
</body>
</html>
